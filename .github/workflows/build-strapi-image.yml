name: Build & push Strapi image

on:
  push:
    branches: ['main', 'claude/**']
    paths:
      - 'maisam-makeup-ecommerce-strapi/**'
      - '.github/workflows/build-strapi-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./maisam-makeup-ecommerce-strapi
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecomstrapi:latest
            ghcr.io/${{ github.repository_owner }}/ecomstrapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
